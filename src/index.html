<html lang="en">

        </span>
        Opium
      </h1>
      <div class="status">
        <span id="proxy-status" class="status-dot"></span>
        <span id="proxy-text">Connecting...</span>
      </div>
    </header>

    <main id="accounts-container">
      <div class="empty-state" id="empty-state">
        <p>Loading...</p>
      </div>
      <div id="accounts-list"></div>
    </main>

    <footer>
      <button id="add-btn" class="btn btn-primary">+ Link Account</button>
      <div class="footer-actions">
        <button id="sync-btn" class="btn btn-icon" title="Sync"><span class="icon">↻</span></button>
        <button id="settings-btn" class="btn btn-icon" title="Settings">⚙</button>
      </div>
    </footer>
  </div>

  <!-- Add Account Modal (OAuth code entry) -->
  <div id="add-modal" class="modal hidden">
    <div class="modal-content">
      <!-- Step 1 hidden - not used in server mode -->
      <div id="add-step-1" class="hidden">
      </div>
      <!-- Step 2: Enter authorization code -->
      <div id="add-step-2">
        <h2>Enter Code</h2>
        <p>A browser window has opened. Sign in to Anthropic, then copy and paste the authorization code here.</p>
        <input type="text" id="auth-code" placeholder="Paste authorization code" autofocus>
        <div class="modal-actions">
          <button id="code-cancel" class="btn">Cancel</button>
          <button id="code-confirm" class="btn btn-primary">Connect</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Share Limit Modal -->
  <div id="limit-modal" class="modal hidden">
    <div class="modal-content">
      <h2>Set Share Limit</h2>
      <p>Maximum % of your account capacity to share with the pool (0-100)</p>
      <input type="number" id="share-limit-input" min="0" max="100" placeholder="50">
      <div class="modal-actions">
        <button id="limit-cancel" class="btn">Cancel</button>
        <button id="limit-confirm" class="btn btn-primary">Save</button>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="modal hidden">
    <div class="modal-content">
      <h2>Server Settings</h2>
      
      <div class="setting">
        <label>Server URL</label>
        <input type="text" id="server-url" placeholder="http://localhost:8082">
      </div>
      <div class="setting">
        <label>API Key</label>
        <input type="password" id="server-api-key" placeholder="op_xxxxxxxx">
      </div>
      <div class="setting">
        <button id="test-connection" class="btn btn-small">Test Connection</button>
        <div id="connection-status"></div>
      </div>
      
      <div class="modal-actions">
        <button id="settings-cancel" class="btn">Cancel</button>
        <button id="settings-save" class="btn btn-primary">Save</button>
      </div>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
