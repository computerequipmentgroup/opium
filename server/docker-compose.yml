version: "3.8"

services:
  opium:
    build: .
    container_name: opium
    env_file: .env
    ports:
      - "8082:8082"
    volumes:
      - opium-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=8082
      - DATABASE_PATH=/app/data/opium.db
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-change-this-in-production-32char}
      - API_KEY_SALT_ROUNDS=12
      - LOG_LEVEL=info
      - ENABLE_REQUEST_LOGGING=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  opium-data:
    driver: local
