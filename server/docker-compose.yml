version: "3.8"

services:
  opium:
    build: .
    container_name: opium
    env_file: .env
    ports:
      - "8082:8082"
    volumes:
      - opium-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=8082
      - DATABASE_PATH=/app/data/opium.db
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-change-this-in-production-32char}
      - API_KEY_SALT_ROUNDS=12
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - LOG_LEVEL=info
      - ENABLE_REQUEST_LOGGING=false
      # Claude CLI integration — the Dockerfile also sets these, duplicated
      # here so compose overrides (if any) are obvious.
      - CLAUDE_BIN=/usr/local/bin/claude
      - OPIUM_HOME_ROOT=/app/data/accounts
      - CLAUDE_MAX_CONCURRENT=${CLAUDE_MAX_CONCURRENT:-8}
      - CLAUDE_TIMEOUT_MS=${CLAUDE_TIMEOUT_MS:-600000}
      - CLAUDE_SESSION_TTL_MS=${CLAUDE_SESSION_TTL_MS:-3600000}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  opium-data:
    driver: local
